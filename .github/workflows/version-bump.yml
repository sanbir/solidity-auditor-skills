name: Version Bump

on:
  push:
    branches: [main]
    paths:
      - 'solidity-auditor/**'
      - '!solidity-auditor/VERSION'

permissions:
  contents: write

jobs:
  bump:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Bump version
        run: |
          CURRENT=$(cat solidity-auditor/VERSION | tr -d '[:space:]')
          NEW=$((CURRENT + 1))
          echo "$NEW" > solidity-auditor/VERSION
          echo "Version bump: ${CURRENT} -> ${NEW}"

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add solidity-auditor/VERSION
          git diff --cached --quiet && exit 0
          git commit -m "bump(solidity-auditor): $(cat solidity-auditor/VERSION)"
          git push
